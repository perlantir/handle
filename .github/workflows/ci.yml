name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - phase-*/**

permissions:
  contents: read

jobs:
  test:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @handle/api prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Web sign-in smoke
        run: |
          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "Skipping web sign-in smoke because Clerk CI secrets are not configured."
            exit 0
          fi
          pnpm smoke:web-signin
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_HANDLE_API_BASE_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_HANDLE_WEB_BASE_URL: http://127.0.0.1:3000

      - name: Build
        run: pnpm build
