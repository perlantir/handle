services:
  temporal:
    image: temporalio/admin-tools:1.25
    command:
      - temporal
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --ui-ip
      - 0.0.0.0
      - --db-filename
      - /var/lib/temporal/temporal.db
    container_name: handle-temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    volumes:
      - handle-temporal-data:/var/lib/temporal
    healthcheck:
      test:
        [
          "CMD",
          "temporal",
          "operator",
          "cluster",
          "health",
          "--address",
          "127.0.0.1:7233",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  handle-temporal-data:
