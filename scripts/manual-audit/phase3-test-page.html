<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Handle Phase 3 Risky Action Fixture</title>
    <style>
      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        margin: 40px;
      }

      button {
        border: 1px solid #d4d7dd;
        border-radius: 8px;
        cursor: pointer;
        display: block;
        font: inherit;
        margin-block: 12px;
        padding: 10px 14px;
      }
    </style>
  </head>
  <body>
    <h1>Handle Phase 3 Risky Action Fixture</h1>
    <p>This page is deterministic and intentionally contains labels that match the Phase 3 browser risk classifier.</p>
    <button id="delete-account" onclick="document.body.dataset.lastAction = 'delete-account'">Delete Account</button>
    <button id="submit-order" type="submit" onclick="document.body.dataset.lastAction = 'submit-order'">Submit Order</button>
    <button id="approve-payment" onclick="document.body.dataset.lastAction = 'approve-payment'">Approve Payment</button>
  </body>
</html>
